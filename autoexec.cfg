cl_crosshairalpha "250";
cl_crosshaircolor "4";
cl_crosshaircolor_b "50";
cl_crosshaircolor_r "250";
cl_crosshaircolor_g "250";
cl_crosshairdot "1";
cl_crosshair_t "0";
cl_crosshairgap "-1";
cl_crosshairsize "1";cl_crosshairstyle "4";cl_crosshairusealpha "1";cl_crosshairthickness "0.4";cl_fixedcrosshairgap "-1";cl_crosshair_outlinethickness "0";cl_crosshair_drawoutline "0";

cl_radar_always_centered "0";
cl_radar_scale "0.3";
cl_hud_radar_scale "1.15";
cl_radar_icon_scale_min "1";
cl_radar_rotate "1";
cl_radar_square_with_scoreboard "1";

bind t "use weapon_c4; drop;";
bindtoggle p "gameinstructor_enable";
bind f5 "buy hegrenade";
bind f6 "buy flashbang";
bind f7 "buy smokegrenade";
bind f8 "buy molotov; buy incgrenade";
bind "kp_slash" "buy awp;";
bind "kp_minus" "buy defuser;";
bind "kp_home" "buy sg556; buy aug;";
bind "kp_plus" "buy ak47; buy m4a1;";
bind "kp_enter" "buy galilar; buy famas;";
bind "kp_end" "buy p90;";
bind "kp_leftarrow" "buy bizon;";
bind "leftarrow" "buy bizon;";
bind "kp_rightarrow" "buy sawedoff; buy mag7;";
bind "rightarrow" "buy sawedoff; buy mag7;";
bind "kp_downarrow" "buy tec9; buy fiveseven;";
bind "downarrow" "buy tec9; buy fiveseven;";
bind "kp_pgdn" "buy deagle;";
bind "kp_ins" "buy vesthelm;";
bind "kp_del" "buy vest;";

bind mwheelup +jump;

cl_teamid_overhead_always 1;
cl_teamid_overhead_maxdist 9999;
alias show show1;
alias show1 "+cl_show_team_equipment; bind w +showup; alias show show2";
alias show2 "unbind w; -cl_show_team_equipment; bind w +forward; alias show show1";

alias +showup "+forward; +cl_show_team_equipment";
alias -showup "-forward;";

// Show netgraph when checking scoreboard
net_graph "1";
net_graphheight "9999";
alias "+scorenet" "+showscores; net_graphheight 0";
alias "-scorenet" "-showscores; net_graphheight 9999";
bind "TAB" "+scorenet";

bind "f" "+lookatweapon;r_cleardecals";

host_writeconfig;

echo "Loaded autoexec!";
